<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiFile Dev Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

<!-- Topbar -->
<header class="topbar">
<h1>MultiFile Dev Viewer</h1>
<div class="top-buttons">
<button id="darkToggle">Dark Mode</button>
<button id="upgradeBtn" class="btn-pro">Upgrade to Pro</button>
</div>
</header>

<!-- App Layout -->
<div class="app">

<!-- Sidebar -->
<aside class="sidebar">
<div id="fileUploadBtn" class="upload-box btn-free">Upload File</div>
<div id="dropArea" class="drop-area">Drag & Drop File Here</div>
<input type="file" id="fileInput" multiple style="display:none">
</aside>

<!-- Workspace -->
<main class="workspace">
<div class="toolbar">
<span>Preview</span>
</div>
<div id="previewContainer" class="preview"></div>
</main>

</div>

<script src="script.js"></script>
</body>
</html>
